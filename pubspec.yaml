name: flux
description: On-device AI assistant for mobile, tablet, and desktop
version: 0.1.9
publish_to: 'none'
environment:
  sdk: ">=3.0.0 <4.0.0"

platforms:
  android:
  ios:
  macos:
  windows:
  linux:
  ohos:

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^6.0.0
  flutter_riverpod: ^2.1.0
  riverpod: ^2.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0

  path_provider: ^2.1.5
  llamadart: ^0.6.10
  background_downloader: ^9.5.4
  webview_flutter: ^4.13.1
  uuid: ^4.5.3
  image_picker: ^1.2.1
  intl: ^0.20.2
  http: ^1.6.0
  html: ^0.15.6
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0
  home_widget: ^0.9.1

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
